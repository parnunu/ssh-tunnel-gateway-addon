name: SSH Tunnel Gateway
version: "1.0.1"
slug: ssh_tunnel_gateway
description: >-
  Expose remote services to your LAN through persistent SSH local port forwards.
url: https://github.com/parnunu/ssh-tunnel-gateway-addon
image: ghcr.io/parnunu/{arch}-addon-ssh-tunnel-gateway
arch:
  - aarch64
  - amd64
  - armv7
host_network: true
startup: application
init: false
stage: stable
map:
  - type: addon_config
    read_only: false
options:
  tunnels: []
schema:
  tunnels:
    - name: str
      ssh_host: str
      ssh_port: port?
      ssh_user: str
      ssh_private_key: str?
      local_port: port
      remote_host: str?
      remote_port: port
      server_alive_interval: int?
      server_alive_count_max: int?
      strict_host_key_checking: bool?
