configuration:
  tunnels:
    name: Tunnels
    description: Configure one or more SSH local-forward tunnels.
    fields:
      name:
        name: Name
        description: Friendly tunnel label shown in logs.
      ssh_host:
        name: SSH Host
        description: Hostname or IP of the SSH server.
      ssh_port:
        name: SSH Port
        description: SSH server port. Default is 22.
      ssh_user:
        name: SSH User
        description: SSH username used for the tunnel connection.
      ssh_private_key:
        name: SSH Private Key
        description: File name stored under the add-on ssh/keys folder. Default is id_ed25519.
      local_port:
        name: Local Port
        description: Port exposed on the Home Assistant host IP.
      remote_host:
        name: Remote Host
        description: Host reached from the SSH server. Default is 127.0.0.1.
      remote_port:
        name: Remote Port
        description: Remote service port reached through the tunnel.
      server_alive_interval:
        name: Server Alive Interval
        description: SSH keepalive interval in seconds. Default is 30.
      server_alive_count_max:
        name: Server Alive Count Max
        description: Failed keepalives before reconnect. Default is 3.
      strict_host_key_checking:
        name: Strict Host Key Checking
        description: Fetch host keys before connect and reject unexpected changes. When disabled, the SSH client learns new keys automatically.
