name: Build add-on images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - "CHANGELOG.md"
      - "Dockerfile"
      - "config.yaml"
      - "run.sh"

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64/v8
          - arch: armv7
            platform: linux/arm/v7
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get add-on version
        id: addon
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          config_text = Path("config.yaml").read_text(encoding="utf-8")
          match = re.search(r'^version:\s*"([^"]+)"', config_text, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to parse version from config.yaml")

          Path(os.environ["GITHUB_OUTPUT"]).write_text(
              f"version={match.group(1)}\n",
              encoding="utf-8",
          )
          PY

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:latest
            BUILD_VERSION=${{ steps.addon.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-ssh-tunnel-gateway:${{ steps.addon.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-ssh-tunnel-gateway:latest
